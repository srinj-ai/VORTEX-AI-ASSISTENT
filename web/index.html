<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VORTEX AI</title>
    <!-- Cache-bust query keeps CSS fresh during development -->
    <link rel="stylesheet" href="/static/style.css?v=fixed-typing-area">
  </head>
  <body>
    <main class="app-shell">
      <!-- Left column: model picker, generation settings, mode switch -->
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-image" src="/static/assets/vortex-logo.png" alt="VORTEX AI">
        </div>

        <!-- Populated by app.js via GET /models -->
        <label class="field">
          <span>Select model</span>
          <select id="modelSelect"></select>
        </label>

        <label class="field range-field">
          <span>Temperature <strong id="temperatureValue">0.7</strong></span>
          <input
            id="temperatureInput"
            type="range"
            min="0"
            max="2"
            step="0.1"
            value="0.7"
          >
        </label>

        <label class="field range-field">
          <span>Max tokens <strong id="maxTokensValue">1000</strong></span>
          <input
            id="maxTokensInput"
            type="range"
            min="100"
            max="4000"
            step="100"
            value="1000"
          >
        </label>

        <nav class="mode-list" aria-label="Modes">
          <button id="chatModeButton" class="mode-button active" type="button">Chat Mode</button>
          <button id="voiceModeButton" class="mode-button" type="button">Voice Mode</button>
        </nav>

        <button id="clearButton" class="secondary-button" type="button">Clear chat</button>
      </aside>

      <!-- Right column: chat transcript or voice UI + message composer -->
      <section class="chat-panel" aria-label="Chat">
        <header class="session-bar">
          <span>Session:</span>
          <strong id="sessionModel">Select a model</strong>
          <button class="dots-button" type="button" aria-label="More options">...</button>
        </header>

        <!-- Message bubbles rendered by app.js -->
        <div id="messages" class="messages"></div>

        <!-- Shown in voice mode; hidden attribute toggled in app.js -->
        <section id="voicePanel" class="voice-panel" aria-label="Voice mode" hidden>
          <header class="voice-header">
            <div class="voice-title">
              <strong>Voice Mode</strong>
              <span id="voiceSupportHint" class="voice-hint"></span>
            </div>

            <label class="voice-toggle">
              <input id="voiceAutoSpeakToggle" type="checkbox" checked>
              <span>Speak AI replies</span>
            </label>
          </header>

          <div class="voice-body">
            <!-- Animated bars injected by setupVoiceWave() in app.js -->
            <div id="voiceWave" class="voice-wave" aria-hidden="true"></div>

            <button id="voiceListenButton" class="voice-listen-button" type="button" aria-label="Start or stop listening">
              <span class="voice-listen-icon" aria-hidden="true"></span>
              <span id="voiceListenLabel">Start listening</span>
            </button>

            <div class="voice-status" role="status" aria-live="polite">
              <div><span class="voice-status-label">Status</span> <strong id="voiceStatusText">Idle</strong></div>
              <div><span class="voice-status-label">Last transcript</span> <span id="voiceTranscriptText" class="voice-transcript">—</span></div>
            </div>
          </div>
        </section>

        <!-- Hidden in voice mode so only the voice panel is visible -->
        <form id="chatForm" class="composer">
          <div class="composer-actions" aria-hidden="true">
            <span>+</span>
            <span>Tools</span>
          </div>
          <textarea
            id="messageInput"
            rows="1"
            placeholder="Type a message..."
            autocomplete="off"
          ></textarea>
          <button class="mic-button" type="button" aria-label="Voice input">Mic</button>
          <button id="sendButton" class="send-button" type="submit" aria-label="Send message">Send</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
